name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Verify tag matches Cargo.toml version
        run: |
          pkg_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match Cargo.toml version v${pkg_version}" >&2
            exit 1
          fi

      - name: Build (x64 + arm64)
        run: |
          name="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')"
          mkdir -p dist
          for pair in "x86_64-apple-darwin:x64" "aarch64-apple-darwin:arm64"; do
            triple="${pair%%:*}"; arch="${pair##*:}"
            cargo build --release --target "$triple"
            cp "target/${triple}/release/${name}" "dist/${name}-darwin-${arch}"
          done

      - name: Generate SHA256 checksums
        run: |
          name="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')"
          cd dist
          shopt -s nullglob
          files=( "${name}"-* )
          [ ${#files[@]} -gt 0 ] || { echo "no build artifacts found in dist/" >&2; exit 1; }
          shasum -a 256 "${files[@]}" > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            cli/dist/*

  deploy-web:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Deploy
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
